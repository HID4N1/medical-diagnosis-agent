services:
  mcp:
    build:
      context: ./mcp_server
    env_file:
      - ./mcp_server/.env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 23000
    ports:
      - "23000:23000"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      MCP_SERVER_URL: http://mcp:23000/mcp
    depends_on:
      - mcp
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
